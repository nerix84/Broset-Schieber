
<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Brøset Violence Checklist</title>

<style>
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Arial;background:#f3f4f6}
header{background:#111827;color:white;padding:16px;position:sticky;top:0}
h1{margin:0;font-size:20px}
main{max-width:760px;margin:auto;padding:12px}

.card{background:white;border-radius:14px;padding:14px;margin:12px 0;border:1px solid #ddd}

.item{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #eee}
.item:last-child{border-bottom:none}

.btn{border:0;border-radius:999px;padding:10px 14px;font-weight:800}
.off{background:#e5e7eb}
.on{background:#111827;color:white}

.vas{
height:44px;
background:linear-gradient(90deg,#22c55e,#facc15,#fb923c,#ef4444);
border-radius:999px;
position:relative;
touch-action:none;
}

.knob{
position:absolute;
top:50%;
transform:translate(-50%,-50%);
width:28px;height:28px;
border-radius:50%;
background:#111827;
border:3px solid white;
}

.result{display:none}
.big{font-size:44px;font-weight:900}

button.bigbtn{
width:100%;
padding:14px;
border:0;
border-radius:12px;
background:#111827;
color:white;
font-weight:900;
}
.small{font-size:13px;color:#444;line-height:1.4}
</style>
</head>

<body>
<header>
<h1>Brøset Violence Checklist</h1>
</header>

<main>

<div class="card" id="items"></div>

<div class="card">
<div class="vas" id="vasBar">
<div class="knob" id="knob"></div>
</div>
</div>

<div class="card">
<button class="bigbtn" onclick="flip()">Schieber umdrehen</button>
<button class="bigbtn" style="margin-top:8px;background:#e5e7eb;color:#111" onclick="resetAll()">Reset</button>
</div>

<div class="card result" id="res">
<div class="big" id="score"></div>
<div id="cat"></div>
<hr>
<div class="small">
Die Brøset Violence Checklist dient der strukturierten Einschätzung kurzfristiger
Gewaltbereitschaft im psychiatrischen Akutsetting. Score 0–3 gering, 4–6 leicht erhöht,
7–9 erhöht, 10–12 hoch.
</div>
</div>

</main>

<script>

const map = "111223333444444445555555555555555566666666";
let state=[0,0,0,0,0,0];

const items=[
["Verwirrtheit","Desorientiert oder deutlich unruhig"],
["Reizbarkeit","leicht provozierbar, gereizt"],
["Lärmendes Verhalten","laut, störend, unruhig"],
["Verbale Drohungen","bedrohliche Aussagen"],
["Körperliche Drohungen","bedrohliche Gestik"],
["Sachaggression","Gegenstände beschädigt"]
];

function init(){
let box=document.getElementById("items");
items.forEach((t,i)=>{
let d=document.createElement("div");
d.className="item";
d.innerHTML=`
<div><b>${t[0]}</b><div class="small">${t[1]}</div></div>
<button class="btn off" id="b${i}" onclick="toggle(${i})">Nein</button>`;
box.appendChild(d);
});
}

function toggle(i){
state[i]=state[i]?0:1;
let b=document.getElementById("b"+i);
b.className="btn "+(state[i]?"on":"off");
b.innerText=state[i]?"Ja":"Nein";
}

function vasValue(x){
let idx=Math.round((x/100)*(map.length-1));
return parseInt(map[idx]);
}

function getVAS(){
let p=parseFloat(document.getElementById("knob").dataset.p||0);
return vasValue(p);
}

// --- SINGLE LINE CLICK/DRAG ---
let bar=document.getElementById("vasBar");
let knob=document.getElementById("knob");

function setPos(clientX){
let rect=bar.getBoundingClientRect();
let x=(clientX-rect.left)/rect.width;
x=Math.max(0,Math.min(1,x));
knob.style.left=(x*100)+"%";
knob.dataset.p=x*100;
}

bar.addEventListener("click",(e)=>setPos(e.clientX));
bar.addEventListener("touchstart",(e)=>setPos(e.touches[0].clientX));

function calc(){
let bvc=state.reduce((a,b)=>a+b,0);
let sub=getVAS();
return bvc+sub;
}

function flip(){
let t=calc();
document.getElementById("res").style.display="block";
document.getElementById("score").innerText=t+"/12";

let c="";
if(t<=3)c="Geringes Risiko";
else if(t<=6)c="Leicht erhöhtes Risiko";
else if(t<=9)c="Erhöhtes Risiko";
else c="Hohes Risiko";

document.getElementById("cat").innerText=c;
}

function resetAll(){
state=[0,0,0,0,0,0];
for(let i=0;i<6;i++){
let b=document.getElementById("b"+i);
b.className="btn off";
b.innerText="Nein";
}
document.getElementById("res").style.display="none";
knob.style.left="0%";
knob.dataset.p=0;
}

init();

</script>

</body>
</html>
